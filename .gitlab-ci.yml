stages:
  - test

security-scan:
  stage: test
  image: python:latest
  before_script:
    - pip install google-genai requests
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - python guardian.py --project-id $CI_PROJECT_ID --mr-iid $CI_MERGE_REQUEST_IID --gitlab-url $CI_SERVER_URL --token $GITLAB_TOKEN --gemini-key $GEMINI_API_KEY
